name: Simple Trivy Scan

# Trigger on push to main or PR
on:
  push:
    branches: [main]
  pull_request:

# Ensure Node.js 24 for JavaScript actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trivy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3.7.1  # Latest version

      # Step 2: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2.11.1  # Latest version

      # Step 3: Build Docker image
      - name: Build Docker image
        run: docker build -t my-app:latest .

      # Step 4: Scan Docker image with Trivy
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v1.2.2  # Latest stable Trivy Action
        with:
          image-ref: my-app:latest
          format: table       # Easy-to-read table
          exit-code: 1       # Fail workflow if HIGH/CRITICAL vulnerabilities
          severity: HIGH,CRITICAL
